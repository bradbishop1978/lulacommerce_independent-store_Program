name: Sync HubSpot Deals

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6 AM UTC (2 AM EST / 11 PM PST)
  workflow_dispatch:        # Manual: Actions tab → Sync HubSpot Deals → Run workflow

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch deals from HubSpot
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: python3 scripts/fetch-deals.py

     - name: Commit updated data file
       run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/hs_deals.json
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "chore: sync HubSpot deals [skip ci]" &&
            git push --force-with-lease
          )
